<main class="layout-main">
  <section class="page-header">
    <h1 data-i18n-en="$pageTitleEn$">$pageTitle$</h1>
    <p data-i18n-en="$pageLeadEn$">$pageLead$</p>
  </section>
  <ol class="post-list">
    $for(posts)$
    <li>
      <a class="post-list__title" href="$url$">$title$</a>
      <div class="post-list__meta">
        <time>$date$</time>
        <span>$categories$</span>
        <span>$tags$</span>
      </div>
    </li>
    $endfor$
  </ol>
</main>
