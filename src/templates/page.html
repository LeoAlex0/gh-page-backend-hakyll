<main class="layout-main">
  <article class="page">
    <header class="page-header">
      <p class="post-date">$date$</p>
      <h1>
        <span class="language-version is-current" data-language-version="$lang$" lang="$lang$">$title$</span>$languageTitles$
      </h1>
    </header>
    <section
      class="post-content language-version is-current"
      data-language-version="$lang$"
      lang="$lang$"
    >
      $body$
    </section>
    $languageSections$
  </article>
</main>
